<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
</head>
<body>
  <script>
    const segmentCount = 1; // Adjust this based on your repo name (1 for username.github.io, 2 for other repos)
    const location = window.location;
    const repo = '/job-search-master-plan';
    const l = location.pathname.split('/').slice(0, 1 + segmentCount).join('/') + repo;
    
    localStorage.setItem('path', location.pathname.replace(l, ''));
    location.replace(l);
  </script>
</body>
</html>
